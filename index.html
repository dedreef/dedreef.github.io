<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV OVERVECHT | Club Teams</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dreef-blauw: #0d061a;
            --dreef-rood: #cc0000;
            --achtergrond: #f4f7f9;
            --sidebar-breedte: 280px;
            --wit: #ffffff;
        }

        body { font-family: 'Roboto', sans-serif; background: var(--achtergrond); margin: 0; display: flex; min-height: 100vh; color: #333; }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-breedte);
            background: var(--dreef-rood);
            color: white;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            border-right: 6px solid var(--dreef-blauw);
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header { text-align: center; margin-bottom: 20px; flex-shrink: 0; }
        .sidebar-logo { width: 80px; margin-bottom: 10px; }
        .sidebar-title { font-family: 'Oswald', sans-serif; font-size: 1.1rem; text-transform: uppercase; color: var(--wit); line-height: 1.2; }

        .category-btn {
            width: 100%; background: var(--dreef-blauw); color: white;
            padding: 12px 20px; border: none; border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: left; font-family: 'Oswald', sans-serif; text-transform: uppercase;
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }

        .team-group {
            display: none;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .sidebar-item:hover .team-group { display: flex; }

        .team-button {
            flex: 1 1 calc(50% - 6px);
            background: var(--wit); color: var(--dreef-blauw);
            border: 1px solid var(--dreef-blauw); padding: 8px 2px;
            font-family: 'Oswald', sans-serif; font-size: 0.85rem;
            text-transform: uppercase; border-radius: 4px; cursor: pointer;
            text-align: center; transition: 0.2s;
        }
        .team-button:hover, .team-button.active { background: var(--dreef-blauw); color: var(--wit); }

        /* CONTENT */
        .main-content { margin-left: var(--sidebar-breedte); flex: 1; padding: 40px; }
        .container { width: 100%; max-width: 900px; margin: 0 auto; }
        
        /* DE GROTE TITEL BOVEN DE RODE STREEP */
        h1#active-team-name { 
            font-family: 'Oswald', sans-serif; 
            color: var(--dreef-blauw); 
            text-transform: uppercase; 
            border-bottom: 4px solid var(--dreef-rood); 
            padding-bottom: 10px; 
            margin-bottom: 30px; 
            font-size: 3rem; /* Lekker groot */
        }
        
        .card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .card-header { background: var(--dreef-rood); color: white; padding: 15px; font-family: 'Oswald', sans-serif; text-align: center; text-transform: uppercase; }
        .mededeling-box { padding: 25px; line-height: 1.6; font-size: 1.1rem; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { position: relative; width: 100%; height: auto; border-right: none; }
            .main-content { margin-left: 0; padding: 20px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="sidebar-logo">
            <div class="sidebar-title">SV OVERVECHT <br> DE DREEF</div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Mannen Zaterdag <span>▼</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">Mannen 1</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 16 & 15 <span>▼</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO16-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO15-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO15-2JM</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 14 <span>▼</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO14-1</button>
                <button class="team-button active" onclick="laadTeam(this)">JO14-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO14-3</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 13 & 12 <span>▼</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO13-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO13-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO12-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO12-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO12-3</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 11 <span>▼</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO11-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO11-2</button>
                <button class="team-button" onclick="laadTeam(this)">JO11-3</button>
                <button class="team-button" onclick="laadTeam(this)">JO11-4</button>
                <button class="team-button" onclick="laadTeam(this)">JO11-5</button>
            </div>
        </div>

    </nav>

    <main class="main-content">
        <div class="container">
            <h1 id="active-team-name">JO14-2</h1>
            
            <div class="card">
                <div class="card-header">Mededeling</div>
                <div id="mededeling-box" class="mededeling-box">Kies een team in de lijst links...</div>
            </div>
        </div>
    </main>

    <script>
        // Data per team (hier kun je later uitslagen/standen toevoegen)
        const TEAM_DATA = {
            'JO14-2': {
                mededeling: "<strong>AANKOMEND ZATERDAG:</strong><br>Verzamelen: 08:00 bij De Dreef.<br>Succes boys! 💪"
            }
        };

        function laadTeam(buttonElement) {
            // Stap 1: Pak de exacte tekst van de knop waar je op klikt
            const teamNaam = buttonElement.innerText;

            // Stap 2: Update de actieve stijl van de knoppen
            document.querySelectorAll('.team-button').forEach(b => b.classList.remove('active'));
            buttonElement.classList.add('active');

            // Stap 3: Zet de tekst DIRECT in de grote titel boven de rode streep
            document.getElementById('active-team-name').innerText = teamNaam;

            // Stap 4: Laad de mededeling (als die er is, anders standaard tekst)
            const data = TEAM_DATA[teamNaam] || { 
                mededeling: "Nog geen mededelingen voor " + teamNaam + "." 
            };
            document.getElementById('mededeling-box').innerHTML = data.mededeling;
        }

        // Zorg dat bij het opstarten de JO14-2 alvast goed staat
        window.onload = function() {
            const startBtn = document.querySelector('.team-button.active');
            if(startBtn) laadTeam(startBtn);
        };
    </script>
</body>
</html>
