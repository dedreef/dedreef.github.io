<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SV OVERVECHT DE DREEF | Clubsite</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --dreef-blauw: #0d061a;
            --dreef-rood: #cc0000;
            --achtergrond: #f0f2f5;
            --sidebar-breedte: 280px;
            --wit: #ffffff;
            --trans-wit: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        /* ALLES op Poppins gezet */
        * { font-family: 'Poppins', sans-serif; }

        body { background: var(--achtergrond); margin: 0; display: flex; min-height: 100vh; color: var(--dreef-blauw); }

        /* SIDEBAR */
        .sidebar {
            width: var(--sidebar-breedte);
            background: linear-gradient(180deg, var(--dreef-rood) 0%, #a00000 100%);
            color: white;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            border-right: 6px solid var(--dreef-blauw);
            display: flex;
            flex-direction: column;
            z-index: 100;
            overflow-y: auto;
        }

        .sidebar-header { padding: 30px 20px; text-align: center; background: rgba(0,0,0,0.15); flex-shrink: 0; }
        .sidebar-logo { width: 100px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3)); }
        
        .sidebar-title { 
            font-size: 1.4rem; 
            text-transform: uppercase; 
            font-weight: 800; /* Extra dik zoals gevraagd */
            color: var(--wit);
            margin-top: 15px;
            line-height: 1.1;
            letter-spacing: -0.5px;
        }

        /* GEPERFECTIONEERDE HOME BUTTON */
        .home-btn {
            display: flex; justify-content: center; align-items: center; 
            width: 90%; margin: 15px auto; height: 60px;
            background: var(--wit); color: var(--dreef-blauw);
            border: none; border-radius: 12px;
            cursor: pointer; 
            font-size: 2rem; font-weight: 800;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }
        .home-btn:hover { transform: translateY(-3px); background: var(--dreef-blauw); color: white; }

        .category-btn {
            width: 100%; background: transparent; color: white;
            padding: 15px 25px; border: none; text-align: left;
            text-transform: uppercase;
            cursor: pointer; display: flex; justify-content: space-between; 
            align-items: center; border-bottom: 1px solid var(--trans-wit);
            font-size: 0.95rem; font-weight: 700; letter-spacing: 0.5px;
        }

        .team-group {
            display: none; background: rgba(0,0,0,0.25); padding: 12px;
            flex-wrap: wrap; gap: 8px;
        }
        
        .sidebar-item:hover .team-group { display: flex; }

        .team-button {
            flex: 1 1 calc(50% - 8px); background: rgba(255,255,255,0.08); color: white;
            border: 1px solid var(--trans-wit); padding: 10px 5px;
            font-size: 0.85rem; font-weight: 600;
            text-transform: uppercase; border-radius: 8px; cursor: pointer;
            transition: all 0.2s;
        }
        .team-button:hover, .team-button.active { background: var(--wit); color: var(--dreef-blauw); font-weight: 800; transform: scale(1.05); }

        /* MAIN CONTENT */
        .main-content { margin-left: var(--sidebar-breedte); flex: 1; padding: 60px; }
        .container { width: 100%; max-width: 1000px; margin: 0 auto; }
        
        h1#active-team-name { 
            color: var(--dreef-blauw); 
            text-transform: uppercase; border-left: 12px solid var(--dreef-rood); 
            padding-left: 30px; margin-bottom: 45px; font-size: 4rem;
            line-height: 0.9; letter-spacing: -2px; font-weight: 900; /* Maximaal dik */
        }
        
        .home-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 30px; }
        .card { background: white; border-radius: 28px; overflow: hidden; box-shadow: var(--shadow); margin-bottom: 30px; }
        
        .card-header { 
            background: var(--dreef-blauw); color: white; padding: 20px 30px; 
            text-transform: uppercase; font-size: 1.2rem; font-weight: 800;
            border-bottom: 5px solid var(--dreef-rood); 
        }
        
        .card-body { padding: 35px; line-height: 1.7; font-size: 1.05rem; color: #333; font-weight: 400; }

        .activity-item { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        .date-badge { 
            background: var(--dreef-rood); color: white; padding: 10px; border-radius: 12px; 
            min-width: 60px; text-align: center; font-weight: 800; font-size: 0.9rem;
        }

        .newsletter-box { background: var(--dreef-blauw); color: white; padding: 30px; border-radius: 24px; text-align: center; }
        .newsletter-box h2 { font-weight: 800; text-transform: uppercase; margin-top: 0; }
        .newsletter-box input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: none; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        .newsletter-btn { background: var(--dreef-rood); color: white; border: none; padding: 12px 30px; border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; width: 100%; }

        @media (max-width: 1000px) {
            .home-grid { grid-template-columns: 1fr; }
            .sidebar { position: relative; width: 100%; border-right: none; }
            .main-content { margin-left: 0; padding: 30px; }
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="sidebar-logo">
            <div class="sidebar-title">SV OVERVECHT<br>DE DREEF</div>
        </div>

        <button class="home-btn" onclick="gaNaarHome()">HOME</button>

        <div class="sidebar-item">
            <button class="category-btn">Mannen Zaterdag <span>+</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">Mannen 1</button>
            </div>
        </div>

        <div class="sidebar-item">
            <button class="category-btn">Onder 16 & 15 <span>+</span></button>
            <div class="team-group">
                <button class="team-button" onclick="laadTeam(this)">JO16-1</button>
                <button class="team-button" onclick="laadTeam(this)">JO15-1</button>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container" id="main-container"></div>
    </main>

    <script>
        const homeContent = `
            <h1 id="active-team-name">SV OVERVECHT</h1>
            <div class="home-grid">
                <div class="left-col">
                    <div class="card">
                        <div class="card-header">Over Onze Club</div>
                        <div class="card-body">
                            Welkom bij SV Overvecht De Dreef. Wij zijn een gemeenschap gericht op sportiviteit en plezier.
                            <br><br>
                            <i>Website onder constructie.</i>
                        </div>
                    </div>
                    <div class="card">
                        <div class="card-header">Club Activiteiten 2026</div>
                        <div class="card-body">
                            <div class="activity-item"><div class="date-badge">12<br>APR</div><div><strong style="font-weight:700;">Paas-Toernooi Jeugd</strong></div></div>
                            <div class="activity-item"><div class="date-badge">20<br>JUN</div><div><strong style="font-weight:700;">Eind-BBQ Seizoen</strong></div></div>
                        </div>
                    </div>
                </div>
                <div class="right-col">
                    <div class="newsletter-box">
                        <h2>NIEUWSBRIEF</h2>
                        <input type="email" placeholder="Je e-mailadres">
                        <button class="newsletter-btn">Aanmelden</button>
                    </div>
                </div>
            </div>
        `;

        function gaNaarHome() {
            document.querySelectorAll('.team-button').forEach(b => b.classList.remove('active'));
            document.getElementById('main-container').innerHTML = homeContent;
        }

        function laadTeam(buttonElement) {
            const teamNaam = buttonElement.innerText;
            document.querySelectorAll('.team-button').forEach(b => b.classList.remove('active'));
            buttonElement.classList.add('active');
            document.getElementById('main-container').innerHTML = `
                <h1 id="active-team-name">${teamNaam}</h1>
                <div class="card">
                    <div class="card-header">Team Informatie</div>
                    <div class="card-body">Informatie voor ${teamNaam} wordt hier geladen.</div>
                </div>`;
        }

        window.onload = gaNaarHome;
    </script>
</body>
</html>
