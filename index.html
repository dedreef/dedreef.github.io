<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>11 vs 11 Tactiekbord | SV Overvecht De Dreef</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gras: #2e7d32;
            --lijn: rgba(255,255,255,0.8);
            --dreef-blauw: #0d061a;
            --dreef-rood: #cc0000;
        }
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; margin: 0; padding: 0; }
        body { background: #1a1a1a; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* ZIJBALK */
        .sidebar { width: 320px; background: #222; padding: 15px; display: flex; flex-direction: column; gap: 12px; border-right: 2px solid #444; overflow-y: auto; }
        h2 { font-weight: 800; font-size: 1.1rem; color: #fff; text-transform: uppercase; }
        .btn { background: var(--dreef-rood); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; width: 100%; transition: 0.2s; }
        .btn:hover { background: #ff1a1a; }
        .btn-secondary { background: #444; }
        .btn-secondary:hover { background: #555; }
        select, input { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #444; background: #333; color: white; }
        
        /* DRAWING TOOLS */
        .tool-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .tool-btn { background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: 600; }
        .tool-btn.active { background: var(--dreef-rood); border-color: var(--dreef-rood); }
        
        /* HET VELD */
        .field-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 20px; position: relative; }
        .field { width: 100%; height: 100%; max-width: 1000px; max-height: 650px; background: var(--gras); border: 4px solid var(--lijn); position: relative; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* BELIJNING */
        .center-line { position: absolute; left: 50%; top: 0; bottom: 0; width: 2px; background: var(--lijn); }
        .center-circle { position: absolute; left: 50%; top: 50%; width: 140px; height: 140px; border: 2px solid var(--lijn); border-radius: 50%; transform: translate(-50%, -50%); }
        .penalty-area-left { position: absolute; left: 0; top: 20%; width: 16%; height: 60%; border: 2px solid var(--lijn); border-left: none; }
        .penalty-area-right { position: absolute; right: 0; top: 20%; width: 16%; height: 60%; border: 2px solid var(--lijn); border-right: none; }
        
        /* SPELERS & BAL */
        .player { width: 32px; height: 32px; border-radius: 50%; position: absolute; display: flex; justify-content: center; align-items: center; font-weight: 800; font-size: 0.75rem; cursor: move; user-select: none; box-shadow: 0 4px 10px rgba(0,0,0,0.4); border: 2px solid white; color: white; z-index: 10; }
        .team-a { background: var(--dreef-rood); }
        .team-b { background: #0055ff; }
        .ball { width: 22px; height: 22px; background: white; border-radius: 50%; border: 2px solid black; position: absolute; cursor: move; z-index: 11; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: bold; color: black; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .player-label { position: absolute; bottom: -16px; font-size: 0.6rem; white-space: nowrap; background: rgba(0,0,0,0.7); padding: 1px 4px; border-radius: 3px; font-weight: 400; color: white; }
        
        /* CANVAS VOOR LIJNEN */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; cursor: crosshair; }
        .drawing-mode canvas { pointer-events: auto; }
        .moving-mode canvas { pointer-events: none; }
    </style>
</head>
<body class="moving-mode">

    <div class="sidebar">
        <h2>📋 Modus</h2>
        <div class="tool-grid">
            <button class="tool-btn active" id="mode-move" onclick="setMode('move')">🖐️ Slepen</button>
            <button class="tool-btn" id="mode-draw" onclick="setMode('draw')">✏️ Tekenen</button>
        </div>
        
        <div id="draw-options" style="display:none; flex-direction: column; gap: 8px;">
            <h2>Line Style</h2>
            <div class="tool-grid">
                <button class="tool-btn active" id="line-solid" onclick="setLineStyle('solid')">── Pass</button>
                <button class="tool-btn" id="line-dashed" onclick="setLineStyle('dashed')">- - Loop</button>
            </div>
            <h2>Kleur</h2>
            <div class="tool-grid">
                <button class="tool-btn active" id="color-yellow" onclick="setLineColor('#ffeb3b')">Geel</button>
                <button class="tool-btn" id="color-white" onclick="setLineColor('#ffffff')">Wit</button>
            </div>
            <button class="btn btn-secondary" style="background:#a00;" onclick="clearCanvas()">Clear Tekening</button>
        </div>

        <hr style="border-color: #444;">
        
        <h2>💾 Opslaan & Replay</h2>
        <input type="text" id="tactic-name" placeholder="Naam van tactiek...">
        <button class="btn" style="margin-top:5px;" onclick="saveTactic()">Sla Frame Op</button>
        
        <select id="saved-tactics" onchange="loadTactic()" style="margin-top:5px;">
            <option value="">-- Kies een tactiek --</option>
        </select>
        <div style="display: flex; gap: 5px; margin-top:5px;">
            <button class="btn btn-secondary" onclick="playReplay()">▶ Play</button>
            <button class="btn btn-secondary" style="background:#a00;" onclick="clearTactics()">🗑️ Wis</button>
        </div>
        
        <hr style="border-color: #444;">
        
        <h2>✏️ Edit Speler</h2>
        <p style="font-size: 0.75rem; color: #aaa;">Klik eerst op een speler op het veld.</p>
        <input type="text" id="edit-name" placeholder="Naam">
        <input type="text" id="edit-num" placeholder="Nummer" style="margin-top: 5px;">
        <button class="btn btn-secondary" style="margin-top: 5px;" onclick="updatePlayer()">Update Speler</button>
    </div>

    <div class="field-container">
        <div class="field" id="field">
            <div class="center-line"></div>
            <div class="center-circle"></div>
            <div class="penalty-area-left"></div>
            <div class="penalty-area-right"></div>
            
            <canvas id="canvas"></canvas>
            
            <div class="ball" id="ball" style="top: 50%; left: 50%; transform: translate(-50%, -50%);">⚽</div>
            
            <div class="player team-a" id="r1" style="top: 47%; left: 3%;" onclick="selectPlayer(this)">1<div class="player-label">KIEPER</div></div>
            <div class="player team-a" id="r2" style="top: 15%; left: 15%;" onclick="selectPlayer(this)">2<div class="player-label">RB</div></div>
            <div class="player team-a" id="r3" style="top: 35%; left: 12%;" onclick="selectPlayer(this)">3<div class="player-label">CV</div></div>
            <div class="player team-a" id="r4" style="top: 60%; left: 12%;" onclick="selectPlayer(this)">4<div class="player-label">CV</div></div>
            <div class="player team-a" id="r5" style="top: 80%; left: 15%;" onclick="selectPlayer(this)">5<div class="player-label">LB</div></div>
            <div class="player team-a" id="r6" style="top: 35%; left: 28%;" onclick="selectPlayer(this)">6<div class="player-label">CVM</div></div>
            <div class="player team-a" id="r8" style="top: 60%; left: 28%;" onclick="selectPlayer(this)">8<div class="player-label">CM</div></div>
            <div class="player team-a" id="r10" style="top: 47%; left: 38%;" onclick="selectPlayer(this)">10<div class="player-label">CAM</div></div>
            <div class="player team-a" id="r7" style="top: 15%; left: 42%;" onclick="selectPlayer(this)">7<div class="player-label">RA</div></div>
            <div class="player team-a" id="r11" style="top: 80%; left: 42%;" onclick="selectPlayer(this)">11<div class="player-label">LA</div></div>
            <div class="player team-a" id="r9" style="top: 47%; left: 46%;" onclick="selectPlayer(this)">9<div class="player-label">SPITS</div></div>

            <div class="player team-b" id="b1" style="top: 47%; left: 94%;" onclick="selectPlayer(this)">1<div class="player-label">KIEPER</div></div>
            <div class="player team-b" id="b2" style="top: 15%; left: 82%;" onclick="selectPlayer(this)">2<div class="player-label">RB</div></div>
            <div class="player team-b" id="b3" style="top: 35%; left: 85%;" onclick="selectPlayer(this)">3<div class="player-label">CV</div></div>
            <div class="player team-b" id="b4" style="top: 60%; left: 85%;" onclick="selectPlayer(this)">4<div class="player-label">CV</div></div>
            <div class="player team-b" id="b5" style="top: 80%; left: 82%;" onclick="selectPlayer(this)">5<div class="player-label">LB</div></div>
            <div class="player team-b" id="b6" style="top: 35%; left: 68%;" onclick="selectPlayer(this)">6<div class="player-label">CVM</div></div>
            <div class="player team-b" id="b8" style="top: 60%; left: 68%;" onclick="selectPlayer(this)">8<div class="player-label">CM</div></div>
            <div class="player team-b" id="b10" style="top: 47%; left: 58%;" onclick="selectPlayer(this)">10<div class="player-label">CAM</div></div>
            <div class="player team-b" id="b7" style="top: 15%; left: 54%;" onclick="selectPlayer(this)">7<div class="player-label">RA</div></div>
            <div class="player team-b" id="b11" style="top: 80%; left: 54%;" onclick="selectPlayer(this)">11<div class="player-label">LA</div></div>
            <div class="player team-b" id="b9" style="top: 47%; left: 50%;" onclick="selectPlayer(this)">9<div class="player-label">SPITS</div></div>
        </div>
    </div>

    <script>
        let selectedPlayerId = null;
        let tacticsData = JSON.parse(localStorage.getItem('coach_tactics_11v11')) || {};
        let currentMode = 'move'; 
        let lineStyle = 'solid'; 
        let lineColor = '#ffeb3b'; 

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const field = document.getElementById('field');

        function resizeCanvas() {
            canvas.width = field.clientWidth;
            canvas.height = field.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 1. MODUS WISSELEN (SLEPEN OF TEKENEN)
        function setMode(mode) {
            currentMode = mode;
            document.body.className = mode + '-mode';
            document.getElementById('mode-move').classList.toggle('active', mode === 'move');
            document.getElementById('mode-draw').classList.toggle('active', mode === 'draw');
            document.getElementById('draw-options').style.display = (mode === 'draw') ? 'flex' : 'none';
        }

        function setLineStyle(style) {
            lineStyle = style;
            document.getElementById('line-solid').classList.toggle('active', style === 'solid');
            document.getElementById('line-dashed').classList.toggle('active', style === 'dashed');
        }

        function setLineColor(color) {
            lineColor = color;
            document.getElementById('color-yellow').classList.toggle('active', color === '#ffeb3b');
            document.getElementById('color-white').classList.toggle('active', color === '#ffffff');
        }

        // 2. SLEPEN VAN SPELERS EN BAL
        const draggables = document.querySelectorAll('.player, .ball');
        draggables.forEach(item => {
            item.addEventListener('mousedown', function(e) {
                if (currentMode !== 'move') return;
                
                let shiftX = e.clientX - item.getBoundingClientRect().left;
                let shiftY = e.clientY - item.getBoundingClientRect().top;

                function moveAt(pageX, pageY) {
                    let fieldRect = field.getBoundingClientRect();
                    let x = pageX - fieldRect.left - shiftX;
                    let y = pageY - fieldRect.top - shiftY;

                    x = Math.max(0, Math.min(x, fieldRect.width - item.clientWidth));
                    y = Math.max(0, Math.min(y, fieldRect.height - item.clientHeight));

                    item.style.left = (x / fieldRect.width) * 100 + '%';
                    item.style.top = (y / fieldRect.height) * 100 + '%';
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);

                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            });
            item.ondragstart = function() { return false; };
        });

        // 3. TEKENEN OP HET CANVAS (MET PIJLEN)
        let drawing = false;
        let startX, startY;

        canvas.addEventListener('mousedown', (e) => {
            if (currentMode !== 'draw') return;
            drawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!drawing || currentMode !== 'draw') return;
            drawing = false;
            
            const rect = canvas.getBoundingClientRect();
            const endX = e.clientX - rect.left;
            const endY = e.clientY - rect.top;

            ctx.strokeStyle = lineColor;
            ctx.lineWidth = 3;
            ctx.setLineDash(lineStyle === 'dashed' ? [10, 10] : []);
            
            // Teken de lijn
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            ctx.lineTo(endX, endY);
            ctx.stroke();

            // Teken de pijl aan het einde
            const angle = Math.atan2(endY - startY, endX - startX);
            ctx.setLineDash([]); // Pijl altijd strak
            ctx.beginPath();
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - 15 * Math.cos(angle - Math.PI / 6), endY - 15 * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(endX, endY);
            ctx.lineTo(endX - 15 * Math.cos(angle + Math.PI / 6), endY - 15 * Math.sin(angle + Math.PI / 6));
            ctx.stroke();
        });

        function clearCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // 4. SPELERS AANPASSEN
        function selectPlayer(element) {
            if (currentMode !== 'move') return;
            selectedPlayerId = element.id;
            draggables.forEach(p => p.style.borderColor = (p.id === 'ball') ? 'black' : 'white');
            element.style.borderColor = 'yellow';
            
            if (element.id !== 'ball') {
                document.getElementById('edit-name').value = element.querySelector('.player-label').innerText;
                document.getElementById('edit-num').value = element.childNodes[0].textContent;
            }
        }

        function updatePlayer() {
            if (!selectedPlayerId || selectedPlayerId === 'ball') return alert('Klik eerst op een speler!');
            const player = document.getElementById(selectedPlayerId);
            player.childNodes[0].textContent = document.getElementById('edit-num').value;
            player.querySelector('.player-label').innerText = document.getElementById('edit-name').value.toUpperCase();
        }

        // 5. SAVEN EN REPLAYEN
        function updateSelectDropdown() {
            const select = document.getElementById('saved-tactics');
            select.innerHTML = '<option value="">-- Kies een tactiek --</option>';
            for (let name in tacticsData) {
                const option = document.createElement('option'); option.value = name; option.innerText = name;
                select.appendChild(option);
            }
        }
        updateSelectDropdown();

        function saveTactic() {
            const nameInput = document.getElementById('tactic-name').value;
            if (!nameInput) return alert('Geef de tactiek een naam!');
            
            let currentPositions = {};
            draggables.forEach(item => {
                currentPositions[item.id] = {
                    top: item.style.top,
                    left: item.style.left,
                    num: (item.id !== 'ball') ? item.childNodes[0].textContent : '⚽',
                    name: (item.id !== 'ball') ? item.querySelector('.player-label').innerText : 'BAL'
                };
            });

            if(!tacticsData[nameInput]) tacticsData[nameInput] = [];
            tacticsData[nameInput].push(currentPositions);
            
            localStorage.setItem('coach_tactics_11v11', JSON.stringify(tacticsData));
            updateSelectDropdown();
            alert('Frame opgeslagen!');
        }

        function loadTactic() {
            const selected = document.getElementById('saved-tactics').value;
            if (selected && tacticsData[selected]) applyFrame(tacticsData[selected][0]);
        }

        function applyFrame(frame) {
            for (let id in frame) {
                const item = document.getElementById(id);
                if (item) {
                    item.style.top = frame[id].top;
                    item.style.left = frame[id].left;
                    if(id !== 'ball') {
                        item.childNodes[0].textContent = frame[id].num;
                        item.querySelector('.player-label').innerText = frame[id].name;
                    }
                }
            }
        }

        function playReplay() {
            const selected = document.getElementById('saved-tactics').value;
            if (!selected) return alert('Kies een tactiek.');
            const frames = tacticsData[selected];
            let currentFrame = 0;
            
            const interval = setInterval(() => {
                applyFrame(frames[currentFrame]);
                currentFrame++;
                if (currentFrame >= frames.length) clearInterval(interval);
            }, 1000);
        }

        function clearTactics() {
            if(confirm('Alles wissen?')) { localStorage.removeItem('coach_tactics_11v11'); tacticsData = {}; updateSelectDropdown(); }
        }
    </script>
</body>
</html>
